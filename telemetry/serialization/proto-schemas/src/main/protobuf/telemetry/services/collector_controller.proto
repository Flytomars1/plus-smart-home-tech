syntax = "proto3";

package telemetry.service.collector;

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.grpc.telemetry.collector";

import "telemetry/messages/sensor_event.proto";
import "telemetry/messages/hub_event.proto";

service CollectorController {
  rpc CollectSensorEvent (telemetry.message.event.SensorEventProto) returns (CollectorResponseProto);
  rpc CollectHubEvent (telemetry.message.event.HubEventProto) returns (CollectorResponseProto);
}

message CollectorResponseProto {
  bool success = 1;
  string message = 2;
}