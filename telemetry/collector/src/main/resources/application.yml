spring:
  application:
    name: collector

server:
  port: 8080

logging:
  level:
    ru.yandex.practicum.collector: DEBUG
    org.springframework.web: DEBUG
    org.apache.kafka: INFO

kafka:
  bootstrap-servers: localhost:9092
  topics:
    sensors: telemetry.sensors.v1
    hubs: telemetry.hubs.v1