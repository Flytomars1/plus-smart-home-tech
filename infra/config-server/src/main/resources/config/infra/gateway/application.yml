              args:
                retries: 3
                statuses:
                  - SERVICE_UNAVAILABLE
                  - INTERNAL_SERVER_ERROR
                methods:
                  - GET
                  - POST
                  - PUT
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2
                  basedOnPreviousValue: true

        - id: warehouse_service_route
