spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/delivery
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    config:
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

server:
  port: 0

logging:
  level:
    ru.yandex.practicum.delivery: DEBUG

delivery:
  warehouse:
    address:
      country: "Russia"
      city: "Moscow"
      street: "ADDRESS_1"
      house: "1"
      flat: "1"